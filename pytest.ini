[pytest]
addopts = --strict-markers

; log capture settings
log_level = INFO
log_format = %(asctime)s [%(levelname).1s]: %(message)s

; live log settings
log_cli = True
log_cli_date_format = %H:%M:%S.%f
log_cli_format = %(asctime).12s [%(levelname).1s]: %(message)s
log_cli_level = INFO

; log file settings
log_file = logs/run.log
log_file_date_format = %Y-%m-%dT%H:%M:%S.%f
log_file_format = %(asctime)s %(levelname)s: %(message)s
log_file_level = INFO
